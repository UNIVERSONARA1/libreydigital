<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- ============================================================
     LIBRE Y DIGITAL · Catálogo web (v2 · rediseño claro)
     Un solo archivo autocontenido, listo para GitHub Pages.
     Los productos se leen en vivo desde el CSV publicado de Google
     Sheets (hoja "Publicar_Web" — NUNCA apuntar a la hoja "Precios").
     Para agregar/editar productos: edita el Google Sheet, no este archivo.

     CAMBIOS v2 vs v1:
     - Lectura de columna de precio TOLERANTE (antes buscaba
       exactamente "Precio" y la hoja publica "Precio final" -> por
       eso no cargaban los precios).
     - Marcas normalizadas por texto (POCO/Poco ya no duplican chip).
     - Placeholder de imagen ya no muestra "1" (usa ícono de categoría).
     - Se eliminó la franja de marcas duplicada.
     - Rediseño completo: fondo claro, filtros de marca en panel
       aparte (no todos los chips sueltos), precio protagonista.
     ============================================================ -->

<title>Libre y Digital · Catálogo de tecnología</title>
<meta name="description" content="Celulares, tablets, portátiles y más de las mejores marcas. Elige tu equipo y pídelo por WhatsApp con Libre y Digital." />

<meta property="og:type" content="website" />
<meta property="og:site_name" content="Libre y Digital" />
<meta property="og:title" content="Libre y Digital · Catálogo de tecnología" />
<meta property="og:description" content="Celulares, tablets, portátiles y más. Elige tu equipo y pídelo por WhatsApp." />
<meta property="og:url" content="https://libreydigital.co" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="theme-color" content="#EEF1F5" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />

<style>
:root{
  /* ---- Sistema de color v2: fondo claro azulado, texto grafito, acento
     azul eléctrico + cian, verde SOLO para WhatsApp (Von Restorff) ---- */
  --bg:#EEF1F5; --bg-2:#E4E9F0; --card:#FFFFFF; --card-2:#F7F9FC;
  --line:#DDE3EC; --line-soft:#E7ECF3;
  --ink:#10151C; --muted:#5B6472; --muted-2:#8992A3;
  --accent:#2F6FED; --accent-2:#0EA9B8;
  --accent-grad:linear-gradient(120deg,#2F6FED 0%,#0EA9B8 100%);
  --accent-soft:#EAF1FE;
  --wa:#1FAF52; --wa-dark:#158A40;
  --radius:16px; --radius-sm:11px;
  --shadow:0 16px 40px -18px rgba(16,21,28,.18);
  --ease:cubic-bezier(.22,.61,.36,1);
  --font-disp:"Space Grotesk",Inter,sans-serif;
  --font-body:"Inter",system-ui,sans-serif;
  --font-mono:"IBM Plex Mono",monospace;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
  min-height:100vh;
}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::selection{background:rgba(47,111,237,.2)}
.wrap{max-width:1180px;margin:0 auto;padding:0 18px}

/* ============ HEADER ============ */
header{position:sticky;top:0;z-index:40;background:rgba(238,241,245,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.head-row{display:flex;align-items:center;gap:16px;padding:14px 0}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-mark{width:38px;height:38px;border-radius:11px;object-fit:cover;flex-shrink:0;box-shadow:var(--shadow)}
.logo-txt b{display:block;font-family:var(--font-disp);font-size:15px;font-weight:700;letter-spacing:-.01em}
.logo-txt span{display:block;font-size:11px;color:var(--muted)}
.search-box{flex:1;position:relative;max-width:460px}
.search-box input{
  width:100%;background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:11px 14px 11px 40px;color:var(--ink);font-size:14px;outline:none;transition:border-color .2s var(--ease),box-shadow .2s var(--ease)
}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.search-box svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted-2)}
.head-count{margin-left:auto;font-size:13px;color:var(--muted);white-space:nowrap}
.head-count b{color:var(--ink);font-family:var(--font-mono)}

/* ============ BANNER PROMOCIONAL (carrusel liviano) ============ */
.promo-wrap{padding:14px 0 0;overflow:hidden}
.promo-track{display:flex;transition:transform .45s var(--ease)}
.promo-slide{
  flex:0 0 100%;border-radius:18px;padding:22px 24px;aspect-ratio:2.6/1;
  display:flex;flex-direction:column;justify-content:center;gap:4px;position:relative;overflow:hidden;
  color:#fff;
}
.promo-slide::after{
  content:"";position:absolute;inset:0;
  background:radial-gradient(420px 200px at 85% -20%, rgba(255,255,255,.22), transparent 60%);
  pointer-events:none;
}
.promo-slide.v1{background:linear-gradient(120deg,#173B8C 0%,#2F6FED 55%,#0EA9B8 100%)}
.promo-slide.v2{background:linear-gradient(120deg,#0B1F3A 0%,#154C7A 60%,#0EA9B8 100%)}
/* Slide de imagen: cover + posición centrada, así se auto-ajusta sin
   importar el tamaño exacto de la foto que subas (se recorta al
   centro, nunca se deforma). Pixelaje recomendado más abajo en JS. */
.promo-slide.img-slide{background-size:cover;background-position:center;justify-content:flex-end}
.promo-slide.img-slide::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(0deg, rgba(11,15,20,.75) 0%, rgba(11,15,20,.05) 55%);
}
.promo-slide.img-slide .promo-eyebrow,.promo-slide.img-slide .promo-title,.promo-slide.img-slide .promo-sub{position:relative;z-index:1}
.promo-eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;opacity:.85}
.promo-title{font-family:var(--font-disp);font-size:19px;font-weight:700;margin:0;max-width:80%}
.promo-sub{font-size:12.5px;opacity:.9;max-width:70%}
.promo-dots{display:flex;gap:6px;justify-content:center;padding:10px 0 2px}
.promo-dot{width:6px;height:6px;border-radius:999px;background:var(--line);transition:all .2s var(--ease)}
.promo-dot.on{background:var(--accent);width:18px}

/* ============ NAV DE CATEGORÍAS (única fila visible siempre) ============ */
.cat-nav{display:flex;gap:8px;overflow-x:auto;padding:12px 0;scrollbar-width:none}
.cat-nav::-webkit-scrollbar{display:none}
.cat-chip{
  padding:8px 15px;border-radius:999px;border:1px solid var(--line);background:var(--card);
  font-size:13px;font-weight:600;color:var(--muted);white-space:nowrap;transition:all .18s var(--ease);flex-shrink:0
}
.cat-chip:hover{border-color:var(--accent);color:var(--ink)}
.cat-chip.on{background:var(--accent-grad);color:#fff;border-color:transparent}

/* ============ BARRA DE HERRAMIENTAS (filtros escondidos, orden visible) ============ */
.tools-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:0 0 14px}
.tools-row select{
  background:var(--card);border:1px solid var(--line);border-radius:10px;color:var(--ink);
  padding:9px 12px;font-size:13px;outline:none
}
.filter-btn{
  padding:9px 14px;border-radius:10px;border:1px solid var(--line);background:var(--card);
  color:var(--ink);font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;position:relative
}
.filter-btn:hover{border-color:var(--accent)}
.filter-btn .n{background:var(--accent-grad);color:#fff;font-size:10.5px;font-weight:700;border-radius:999px;padding:1px 6px;font-family:var(--font-mono)}
.clear-btn{
  padding:9px 14px;border-radius:10px;border:1px solid transparent;background:transparent;
  color:var(--muted);font-size:13px;display:flex;align-items:center;gap:6px
}
.clear-btn:hover{color:var(--ink);text-decoration:underline}

/* ============ CHIPS DE FILTROS ACTIVOS ============ */
.active-filters{display:flex;gap:8px;flex-wrap:wrap;padding:0 0 14px}
.active-filters:empty{display:none;padding:0}
.af-chip{
  display:flex;align-items:center;gap:6px;padding:6px 8px 6px 12px;border-radius:999px;
  background:var(--accent-soft);color:var(--accent);font-size:12.5px;font-weight:600
}
.af-chip button{width:16px;height:16px;border-radius:50%;background:rgba(47,111,237,.15);display:flex;align-items:center;justify-content:center}
.af-chip button svg{width:9px;height:9px}

/* ============ PANEL DE MARCAS (drawer, cerrado por defecto) ============ */
.brand-panel{
  position:fixed;inset:0;z-index:90;display:none;
}
.brand-panel.show{display:block}
.brand-panel .bp-overlay{position:absolute;inset:0;background:rgba(16,21,28,.4)}
.brand-panel .bp-sheet{
  position:absolute;right:0;top:0;bottom:0;width:min(340px,86vw);background:var(--card);
  box-shadow:var(--shadow);padding:20px;overflow-y:auto;
  transform:translateX(100%);transition:transform .28s var(--ease)
}
.brand-panel.show .bp-sheet{transform:translateX(0)}
.bp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.bp-head h3{margin:0;font-family:var(--font-disp);font-size:17px}
.bp-close{width:32px;height:32px;border-radius:9px;background:var(--card-2);display:flex;align-items:center;justify-content:center}
.bp-grid{display:flex;flex-wrap:wrap;gap:8px}
.bp-chip{
  padding:7px 12px;border-radius:9px;border:1px solid var(--line);background:var(--card-2);
  font-size:12.5px;color:var(--muted);transition:all .15s var(--ease)
}
.bp-chip.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);font-weight:700}
.bp-apply{width:100%;margin-top:18px;padding:12px;border-radius:11px;background:var(--accent-grad);color:#fff;font-weight:700;font-size:14px}

/* ============ GRID ============ */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;padding:6px 0 60px}
@media (max-width:560px){.grid{grid-template-columns:1fr 1fr;gap:10px}}

.card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;
  display:flex;flex-direction:column;animation:rise .45s var(--ease) both;transition:transform .2s var(--ease),box-shadow .2s var(--ease)
}
.card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card.agotado{opacity:.55}

.media{position:relative;aspect-ratio:1/1;background:
    repeating-linear-gradient(135deg, var(--card-2) 0 2px, transparent 2px 22px),
    var(--card-2);
  display:flex;align-items:center;justify-content:center;overflow:hidden}
.ph-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.ph-icon svg{width:46%;height:46%;color:var(--muted-2);opacity:.55}
.prod-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;background:var(--card-2)}
.badges{position:absolute;top:8px;left:8px;right:8px;display:flex;gap:6px;flex-wrap:wrap;z-index:2}
.badge{font-size:10.5px;font-weight:700;padding:4px 8px;border-radius:7px;letter-spacing:.01em}
.badge.cat{background:rgba(255,255,255,.9);color:var(--accent);border:1px solid var(--line)}
.badge.hot{background:#FFF1E0;color:#B5650A}
.badge.trend{background:#E6F8EC;color:#158A40}
.badge.agotado-badge{background:#EDEFF3;color:var(--muted)}

.body{padding:14px 14px 16px;display:flex;flex-direction:column;gap:7px;flex:1}
.brand-line{font-family:var(--font-mono);font-size:10.5px;color:var(--accent-2);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.body h3{margin:0;font-family:var(--font-disp);font-size:15.5px;font-weight:600;line-height:1.3;color:var(--ink)}
.desc{margin:0;font-size:12.5px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.variant-price-list{display:flex;flex-direction:column;gap:5px;margin-top:4px;padding-top:6px;border-top:1px dashed var(--line-soft)}
.vp-caption{font-size:10.5px;color:var(--muted-2);font-weight:600;text-transform:uppercase;letter-spacing:.03em;margin-bottom:1px}
.vp-row{
  display:flex;align-items:center;justify-content:space-between;width:100%;
  padding:7px 10px;border-radius:9px;border:1px solid var(--line);background:var(--card-2);
  font-size:12px;color:var(--muted);transition:all .15s var(--ease)
}
.vp-row .vp-est{font-weight:600;color:var(--ink)}
.vp-row .vp-price{font-family:var(--font-disp);font-weight:700;font-variant-numeric:tabular-nums;color:var(--ink)}
.vp-row.on{border-color:var(--accent);background:var(--accent-soft)}
.vp-row.on .vp-est,.vp-row.on .vp-price{color:var(--accent)}
.vp-row.off{opacity:.45}
.vp-row.off .vp-price{text-decoration:line-through;font-weight:600;font-family:var(--font-body)}

.specs{display:flex;flex-direction:column;gap:4px;margin-top:2px}
.spec{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.spec svg{width:13px;height:13px;flex-shrink:0;color:var(--muted-2)}

.price-row{margin-top:auto;padding-top:8px;border-top:1px dashed var(--line-soft)}
.price{font-family:var(--font-disp);font-size:21px;font-weight:700;letter-spacing:-.01em;font-variant-numeric:tabular-nums;color:var(--ink)}
.price small{font-size:11px;color:var(--muted);font-weight:600;margin-left:3px;font-family:var(--font-body)}
.price-ask{font-family:var(--font-disp);font-size:14.5px;font-weight:700;color:var(--accent)}

.actions{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.btn{border-radius:9px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;transition:transform .15s var(--ease),filter .15s var(--ease)}
.btn:active{transform:scale(.97)}
.btn-wa{background:linear-gradient(120deg,var(--wa),var(--wa-dark));color:#fff;box-shadow:0 6px 14px -8px rgba(31,175,82,.5);padding:8px 12px;font-size:12.5px}
.btn-wa svg{width:14px;height:14px}
.btn-wa:hover{filter:brightness(1.06)}
.btn-wa:disabled{background:var(--line);color:var(--muted);cursor:not-allowed;box-shadow:none}
.btn-row{display:flex;gap:8px}
.btn-ghost{flex:1;border:1px solid var(--line);color:var(--muted);background:var(--card);padding:7px 10px;font-size:12px}
.btn-ghost:hover{border-color:var(--accent);color:var(--ink)}
.btn-ghost svg{width:13px;height:13px}

/* ============ ESTADO VACÍO / CARGA ============ */
.empty,.loading{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center;gap:12px}
.empty .ico,.loading .ico{width:52px;height:52px;color:var(--muted-2)}
.empty h3,.loading h3{margin:0;font-family:var(--font-disp);font-size:17px}
.empty p,.loading p{margin:0;color:var(--muted);font-size:13.5px;max-width:320px}
.empty button{padding:10px 18px;border-radius:10px;border:1px solid var(--accent);color:var(--accent);font-size:13px;font-weight:700;margin-top:6px;background:var(--accent-soft)}
.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ============ COMPARADOR ============ */
.cmp-bar{
  position:fixed;left:50%;bottom:18px;transform:translate(-50%,120%);z-index:50;
  background:var(--ink);color:#fff;border-radius:14px;box-shadow:var(--shadow);
  padding:10px 10px 10px 16px;display:flex;align-items:center;gap:12px;transition:transform .3s var(--ease)
}
.cmp-bar.show{transform:translate(-50%,0)}
.cmp-bar .txt{font-size:13px;color:#C7CCD4}
.cmp-bar .txt b{color:#fff}
.cmp-bar button{padding:9px 15px;border-radius:9px;font-size:13px;font-weight:700}
.cmp-bar .go{background:var(--accent-grad);color:#fff}
.cmp-bar .go:disabled{opacity:.4}
.cmp-bar .clr{color:#C7CCD4;border:1px solid #333B47}
.cmp-toggle{
  position:absolute;top:8px;right:8px;z-index:2;width:28px;height:28px;border-radius:8px;
  background:rgba(255,255,255,.9);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;
  color:var(--ink);transition:all .15s var(--ease);border:1px solid var(--line)
}
.cmp-toggle.on{background:var(--accent);color:#fff;border-color:transparent}
.cmp-toggle svg{width:14px;height:14px}

/* ============ OVERLAY / MODAL ============ */
.overlay{position:fixed;inset:0;background:rgba(16,21,28,.5);backdrop-filter:blur(3px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--line);border-radius:20px;max-width:380px;width:100%;padding:26px 24px;text-align:center;box-shadow:var(--shadow);animation:pop .3s var(--ease);color:var(--ink)}
@keyframes pop{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.modal .ico-wa{width:56px;height:56px;border-radius:50%;background:#E6F8EC;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.modal .ico-wa svg{width:28px;height:28px;color:var(--wa)}
.modal h3{margin:0 0 6px;font-family:var(--font-disp);font-size:17px}
.modal p{margin:0 0 18px;color:var(--muted);font-size:13.5px}
.steps{text-align:left;display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.step{display:flex;gap:10px;align-items:flex-start}
.step .n{width:22px;height:22px;border-radius:50%;background:var(--accent-grad);color:#fff;font-size:11.5px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step .t{font-size:13px;color:var(--muted)}
.step .t b{color:var(--ink)}
.modal .close-btn{width:100%;padding:12px;border-radius:11px;background:var(--accent-grad);color:#fff;font-weight:700;font-size:14px}

@media (max-width:560px){
  .logo-txt span{display:none}
  .head-count{display:none}
  .search-box{max-width:none}
}
</style>
</head>
<body>

<header>

<script>
/* ==============================================================
   0) CONFIGURACIÓN
   ============================================================== */
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRKQ_5kPIsm2vnrAiRzFLXFd4s8KyfxvsokCG2Bp5PKDlSsdWqQX6WZfA1DNXKl38XzQMJ8CXw6jJ7O/pub?gid=1474601069&single=true&output=csv";
const CONTADOR_URL = "https://script.google.com/macros/s/AKfycbzC86qascdbcfVS6gvSuqQ11TXz8DZ-Xuw23r8RQW4Sw1cWUxfQx6YjXxoP1b80qhmN3g/exec";
const MOSTRAR_PRECIOS = true; // interruptor: false = solo "Consultar"
const WHATSAPP_NUM = "573178047523";
const NEGOCIO = { nombre:"Libre y Digital", nit:"80171352", tel:"+57 317 804 7523", web:"libreydigital.co" };

const $  = (s,el=document)=>el.querySelector(s);
const $$ = (s,el=document)=>[...el.querySelectorAll(s)];
const norm = s => (s||"").toString().normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim();
const formatCOP = n => n==null || isNaN(n) ? "" : "$" + Math.round(n).toLocaleString("es-CO");

/* ==============================================================
   1) PARSER CSV (soporta comillas y comas dentro de campos)
   ============================================================== */
function parseCSV(text){
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i], next = text[i+1];
    if(inQuotes){
      if(c === '"' && next === '"'){ field += '"'; i++; }
      else if(c === '"'){ inQuotes = false; }
      else field += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ','){ row.push(field); field = ""; }
      else if(c === '\n' || c === '\r'){
        if(c === '\r' && next === '\n') i++;
        row.push(field); rows.push(row); row = []; field = "";
      } else field += c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r => r.length > 1 || r[0] !== "");
}

/* ==============================================================
   BÚSQUEDA TOLERANTE DE COLUMNAS
   -----------------------------------------------------------
   BUG CORREGIDO: la hoja publica la columna de precio como
   "Precio final", pero el código anterior buscaba exactamente
   "Precio" y nunca la encontraba -> por eso nada mostraba precio.
   Esta función prueba varios nombres posibles y también hace
   match parcial, para que un cambio de nombre en la hoja no
   vuelva a romper la página en silencio.
   ============================================================== */
function findCol(headers, candidatos){
  const normed = headers.map(norm);
  for(const cand of candidatos){
    const nc = norm(cand);
    let i = normed.indexOf(nc);
    if(i>-1) return i;
  }
  for(const cand of candidatos){
    const nc = norm(cand);
    let i = normed.findIndex(h => h.includes(nc) || nc.includes(h));
    if(i>-1) return i;
  }
  return -1;
}

/* --------------------------------------------------------------
   PARSEO DE PRECIO
   BUG CORREGIDO: la hoja guarda el precio como texto en formato
   colombiano ("3.300.000"), donde el punto es separador de MILES,
   no decimal. El parseo anterior lo leía como si el punto fuera
   decimal ("3.300.000" -> 3.3 -> redondeaba a "$3"). Esta función
   distingue miles-con-punto de un decimal real antes de convertir.
   -------------------------------------------------------------- */
function parsePrecio(raw){
  if(raw==null) return null;
  let s = raw.toString().trim().replace(/[^\d.,'-]/g,"");
  if(!s) return null;
  s = s.replace(/'/g,".");                    // 1'000.000 -> 1.000.000 (apóstrofe = punto de miles)
  if(/^\d{1,3}(\.\d{3})+(,\d+)?$/.test(s)){    // $2.590.000 o $2.590.000,00
    return parseInt(s.split(",")[0].replace(/\./g,""),10) || null;
  }
  if(/^\d{1,3}(,\d{3})+(\.\d+)?$/.test(s)){    // $2,590,000 o $2,590,000.00
    return Math.round(parseFloat(s.replace(/,/g,""))) || null;
  }
  const n = parseFloat(s.replace(",","."));    // número simple: 2590000 o 2590000.0
  return isNaN(n) ? null : Math.round(n);
}

/* --------------------------------------------------------------
   LIMPIEZA DE CAMPOS DE TEXTO
   BUG CORREGIDO: varias fórmulas de la hoja devuelven el texto
   literal "0" cuando el campo está vacío (Notas, Etiqueta). Antes
   se mostraba ese "0" como si fuera una especificación o etiqueta
   real. Esta función lo trata igual que un campo vacío.
   -------------------------------------------------------------- */
function limpiarCampo(v){
  const s = (v||"").toString().trim();
  return (s==="" || s==="0") ? "" : s;
}

/* ==============================================================
   2) CARGA Y TRANSFORMACIÓN DE DATOS
   ============================================================== */
let TARJETAS = [];
let MARCAS_CANONICAS = new Map(); // clave normalizada -> nombre a mostrar
let estado = { q:"", cat:"Todas", marcas:new Set(), sort:"rel", cmp:new Set() };

async function cargarCatalogo(){
  try{
    const res = await fetch(CSV_URL, { cache: "no-store" });
    if(!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    const headers = rows[0].map(h => h.trim());

    const iMarca   = findCol(headers, ["Marca"]);
    const iCat     = findCol(headers, ["Categoria","Categoría"]);
    const iProd    = findCol(headers, ["Producto"]);
    const iCap     = findCol(headers, ["Capacidad"]);
    const iEstado  = findCol(headers, ["Estado"]);
    const iEtq     = findCol(headers, ["Etiqueta"]);
    const iPrecio  = findCol(headers, ["Precio final","Precio_final","Preciofinal","Precio"]);
    const iNotas   = findCol(headers, ["Notas"]);
    const iId      = findCol(headers, ["ID_Tarjeta"]);
    const iPrio    = findCol(headers, ["Prioridad_Estado"]);
    const iDisp    = findCol(headers, ["Disponibilidad"]);
    const iVeces   = findCol(headers, ["Veces_Solicitado"]);

    const grupos = new Map();

    // Primera pasada: contar cómo se escribe cada marca para elegir
    // la grafía más común como "canónica" (arregla POCO vs Poco, etc.)
    const conteoMarca = new Map();
    for(let r=1;r<rows.length;r++){
      const row = rows[r];
      const bruta = (row[iMarca]||"").trim();
      if(!bruta) continue;
      const key = norm(bruta);
      const entry = conteoMarca.get(key) || {};
      entry[bruta] = (entry[bruta]||0) + 1;
      conteoMarca.set(key, entry);
    }
    conteoMarca.forEach((variantes, key)=>{
      const mejor = Object.entries(variantes).sort((a,b)=>b[1]-a[1])[0][0];
      MARCAS_CANONICAS.set(key, mejor);
    });

    for(let r=1;r<rows.length;r++){
      const row = rows[r];
      if(!row || !row[iMarca]) continue;
      const disponibilidad = (row[iDisp]||"").trim();
      if(disponibilidad === "Descontinuado") continue; // nunca se muestra

      const marcaBruta = (row[iMarca]||"").trim();
      const marca = MARCAS_CANONICAS.get(norm(marcaBruta)) || marcaBruta;

      const idTarjeta = (iId>-1 && row[iId] && row[iId].trim()) || norm(`${marca}-${row[iProd]}-${row[iCap]}`).replace(/[^a-z0-9]+/g,"-");
      const variante = {
        estado: (row[iEstado]||"").trim(),
        etiqueta: limpiarCampo(row[iEtq]),
        precio: parsePrecio(row[iPrecio]),
        disponibilidad: disponibilidad || "Disponible",
        prioridad: parseInt(row[iPrio]) || 4,
      };

      if(!grupos.has(idTarjeta)){
        grupos.set(idTarjeta, {
          id: idTarjeta,
          marca,
          categoria: (row[iCat]||"").trim(),
          producto: (row[iProd]||"").trim(),
          capacidad: (row[iCap]||"").trim(),
          notas: limpiarCampo(row[iNotas]),
          veces: parseInt(row[iVeces]) || 0,
          variantes: []
        });
      }
      grupos.get(idTarjeta).variantes.push(variante);
    }

    TARJETAS = [...grupos.values()].map(t=>{
      t.variantes.sort((a,b)=> a.prioridad - b.prioridad);
      t.variantePorDefecto = t.variantes.find(v=>v.disponibilidad==="Disponible") || t.variantes[0];
      t.todasAgotadas = t.variantes.every(v=>v.disponibilidad!=="Disponible");
      t.esTendencia = false;
      return t;
    });

    [...TARJETAS].sort((a,b)=>b.veces-a.veces)
      .filter(t=>t.veces>0)
      .slice(0,3)
      .forEach(t=>{ t.esTendencia = true; });

    construirFiltros();
    renderActiveFilters();
    render();
  }catch(err){
    mostrarErrorCarga(err);
  }
}

function mostrarErrorCarga(err){
  const grid = $("#grid");
  grid.innerHTML = `
    <div class="empty">
      <svg class="ico" viewBox="0 0 24 24" fill="none"><path d="M12 9v4m0 4h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <h3>No pudimos cargar el catálogo</h3>
      <p>Verifica tu conexión a internet. Si el problema sigue, escríbenos por WhatsApp y te ayudamos directamente.</p>
      <button onclick="location.reload()">Reintentar</button>
    </div>`;
}

/* ==============================================================
   PROMO · Carrusel de banners
   -----------------------------------------------------------
   Para agregar un banner con foto, solo agrega un objeto acá con
   tipo:"imagen" y la URL/ruta de la foto. NO necesitas pixelaje
   exacto: el banner tiene una proporción fija (2.6:1) y la imagen
   se recorta automáticamente al centro con "cover" — nunca se
   deforma, sin importar el tamaño que subas. Aun así, para que
   nada importante quede recortado en el recorte automático,
   recomendado: 1200×460px (o cualquier foto con esa proporción
   ~2.6:1), con el punto de interés principal centrado.
   ============================================================== */
const PROMO_SLIDES = [
  { tipo:"texto", clase:"v1", eyebrow:"Libre y Digital", titulo:"Cotiza por WhatsApp en un toque", sub:"Elige tu equipo, te armamos la ficha y te escribimos directo." },
  { tipo:"texto", clase:"v2", eyebrow:"Certificación Apple", titulo:"Sellado, CPO o activado — tú eliges", sub:"Cada estado con su precio real, sin sorpresas." },
  // Ejemplo listo para cuando tengas la foto (descomenta y ajusta):
  // { tipo:"imagen", src:"banners/promo-iphone17.jpg", eyebrow:"Recién llegado", titulo:"iPhone 17 Pro ya disponible", sub:"Sellado, con garantía." },
];

function initPromo(){
  const track = $("#promoTrack");
  const dotsBox = $("#promoDots");
  track.innerHTML = PROMO_SLIDES.map(s=>{
    if(s.tipo==="imagen"){
      return `<div class="promo-slide img-slide" style="background-image:url('${s.src}')">
        ${s.eyebrow?`<span class="promo-eyebrow">${s.eyebrow}</span>`:""}
        ${s.titulo?`<p class="promo-title">${s.titulo}</p>`:""}
        ${s.sub?`<span class="promo-sub">${s.sub}</span>`:""}
      </div>`;
    }
    return `<div class="promo-slide ${s.clase||'v1'}">
      <span class="promo-eyebrow">${s.eyebrow}</span>
      <p class="promo-title">${s.titulo}</p>
      <span class="promo-sub">${s.sub}</span>
    </div>`;
  }).join("");

  const slides = $$(".promo-slide", track);
  if(!slides.length) return;
  let i = 0;
  dotsBox.innerHTML = "";
  slides.forEach((_,n)=>{
    const d = document.createElement("span");
    d.className = "promo-dot" + (n===0?" on":"");
    d.onclick = ()=> ir(n);
    dotsBox.appendChild(d);
  });
  function ir(n){
    i = (n + slides.length) % slides.length;
    track.style.transform = `translateX(-${i*100}%)`;
    $$(".promo-dot",dotsBox).forEach((d,k)=>d.classList.toggle("on",k===i));
  }
  let auto = setInterval(()=>ir(i+1), 5000);
  const reset = ()=>{ clearInterval(auto); auto = setInterval(()=>ir(i+1), 5000); };

  let startX = null;
  track.addEventListener("touchstart", e=>{ startX = e.touches[0].clientX; }, {passive:true});
  track.addEventListener("touchend", e=>{
    if(startX==null) return;
    const dx = e.changedTouches[0].clientX - startX;
    if(Math.abs(dx) > 40){ ir(i + (dx<0?1:-1)); reset(); }
    startX = null;
  });
}
initPromo();

/* ==============================================================
   3) FILTROS
   -----------------------------------------------------------
   Categoría: fila única siempre visible (pocas opciones, decisión
   rápida). Marca: escondida en un panel aparte, porque son 30+
   valores y mostrarlos todos sueltos abruma (Ley de Hick).
   ============================================================== */
function construirFiltros(){
  const cats = [...new Set(TARJETAS.map(t=>t.categoria).filter(Boolean))].sort();
  const marcas = [...new Set(TARJETAS.map(t=>t.marca).filter(Boolean))].sort();

  const catNav = $("#catNav");
  catNav.innerHTML = "";
  const mkCat = (txt,val,activo)=>{
    const b = document.createElement("button");
    b.className = "cat-chip" + (activo ? " on":"");
    b.textContent = txt;
    b.onclick = ()=>{ estado.cat = val; syncCatChips(); actualizarConteosMarca(); renderActiveFilters(); render(); };
    b.dataset.val = val;
    return b;
  };
  catNav.appendChild(mkCat("Todas","Todas",true));
  cats.forEach(c=>catNav.appendChild(mkCat(c,c,false)));

  const bpGrid = $("#bpGrid");
  bpGrid.innerHTML = "";
  marcas.forEach(m=>{
    const b = document.createElement("button");
    b.className = "bp-chip";
    b.dataset.val = m;
    b.innerHTML = `${m} <span class="bp-count" style="opacity:.6;font-family:var(--font-mono)"></span>`;
    b.onclick = ()=>{
      if(estado.marcas.has(m)) estado.marcas.delete(m); else estado.marcas.add(m);
      syncBrandChips(); renderActiveFilters(); render();
    };
    bpGrid.appendChild(b);
  });
  actualizarConteosMarca();
}
function syncCatChips(){
  $$(".cat-chip").forEach(b=>b.classList.toggle("on", estado.cat===b.dataset.val));
}
function syncBrandChips(){
  $$(".bp-chip").forEach(b=>b.classList.toggle("on", estado.marcas.has(b.dataset.val)));
  const n = estado.marcas.size;
  $("#filterCount").style.display = n ? "inline-block" : "none";
  $("#filterCount").textContent = n;
}

/* --------------------------------------------------------------
   CONTADOR EN VIVO POR MARCA
   El conteo de cada marca refleja la categoría y el buscador
   activos, pero NUNCA las otras marcas ya seleccionadas — así el
   cliente nunca ve un "(0)" solo por haber marcado otra marca antes,
   y puede seguir sumando marcas al filtro con confianza.
   -------------------------------------------------------------- */
function actualizarConteosMarca(){
  const base = TARJETAS.filter(t=>{
    if(estado.cat!=="Todas" && t.categoria!==estado.cat) return false;
    if(estado.q){
      const blob = norm([t.marca,t.producto,t.categoria,t.notas].join(" "));
      if(!blob.includes(norm(estado.q))) return false;
    }
    return true;
  });
  const conteos = new Map();
  base.forEach(t=> conteos.set(t.marca, (conteos.get(t.marca)||0) + 1));
  $$(".bp-chip").forEach(b=>{
    const n = conteos.get(b.dataset.val) || 0;
    $(".bp-count",b).textContent = `(${n})`;
    b.disabled = n===0 && !estado.marcas.has(b.dataset.val);
    b.style.opacity = b.disabled ? .4 : 1;
  });
}

/* --------------------------------------------------------------
   CHIPS DE FILTROS ACTIVOS (removibles con un toque)
   -------------------------------------------------------------- */
function renderActiveFilters(){
  const box = $("#activeFilters");
  const piezas = [];
  if(estado.cat!=="Todas"){
    piezas.push({label:estado.cat, quitar: ()=>{ estado.cat="Todas"; syncCatChips(); }});
  }
  estado.marcas.forEach(m=>{
    piezas.push({label:m, quitar: ()=>{ estado.marcas.delete(m); syncBrandChips(); }});
  });
  box.innerHTML = piezas.map((p,i)=>`
    <span class="af-chip" data-i="${i}">${p.label}
      <button aria-label="Quitar filtro">
        <svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
      </button>
    </span>`).join("");
  $$(".af-chip",box).forEach((el,i)=>{
    $("button",el).onclick = ()=>{ piezas[i].quitar(); renderActiveFilters(); actualizarConteosMarca(); render(); };
  });
}

$("#openFilters").onclick = ()=> $("#brandPanel").classList.add("show");
$("#bpClose").onclick = ()=> $("#brandPanel").classList.remove("show");
$("#bpOverlay").onclick = ()=> $("#brandPanel").classList.remove("show");
$("#bpApply").onclick = ()=>{ $("#brandPanel").classList.remove("show"); renderActiveFilters(); render(); };

/* ==============================================================
   4) FILTRADO + ORDEN + RENDER
   ============================================================== */
function filtrar(){
  let arr = TARJETAS.filter(t=>{
    if(estado.cat!=="Todas" && t.categoria!==estado.cat) return false;
    if(estado.marcas.size && !estado.marcas.has(t.marca)) return false;
    if(estado.q){
      const blob = norm([t.marca,t.producto,t.categoria,t.notas].join(" "));
      if(!blob.includes(norm(estado.q))) return false;
    }
    return true;
  });
  const precioDe = t => t.variantePorDefecto?.precio ?? 0;
  if(estado.sort==="precio-asc") arr.sort((a,b)=>precioDe(a)-precioDe(b));
  else if(estado.sort==="precio-desc") arr.sort((a,b)=>precioDe(b)-precioDe(a));
  else if(estado.sort==="marca") arr.sort((a,b)=>a.marca.localeCompare(b.marca));
  else if(estado.sort==="pedidos") arr.sort((a,b)=>b.veces-a.veces);
  return arr;
}

/* --------------------------------------------------------------
   FOTOS DE PRODUCTO
   Convención: el archivo se nombra igual que el ID_Tarjeta del
   producto (ej. "apple-16-128gb-128gb.jpg"), subido a la carpeta
   /images/ del repo. No hace falta columna nueva en el Excel: la
   página arma la ruta sola. Si no existe la foto, prueba otras
   extensiones y si ninguna existe, se queda con el ícono de
   categoría (nunca rompe el diseño).
   -------------------------------------------------------------- */
const EXT_INTENTOS = ["jpg","jpeg","png","webp"];
function manejarErrorImagen(img){
  const paso = parseInt(img.dataset.step,10) + 1;
  if(paso < EXT_INTENTOS.length){
    img.dataset.step = paso;
    img.src = `images/${img.dataset.id}.${EXT_INTENTOS[paso]}`;
  } else {
    img.style.display = "none"; // el ícono de respaldo ya está debajo, visible
  }
}

  chip:`<svg viewBox="0 0 24 24" fill="none"><rect x="6" y="6" width="12" height="12" rx="2" stroke="currentColor" stroke-width="2"/><path d="M9 2v3M15 2v3M9 19v3M15 19v3M2 9h3M2 15h3M19 9h3M19 15h3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,
};

  "computadores": `<rect x="4" y="4" width="16" height="12" rx="1.5" stroke="currentColor" stroke-width="1.6"/><path d="M9 20h6M12 16v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>`,
  "smartwatch": `<rect x="7" y="7" width="10" height="10" rx="2.5" stroke="currentColor" stroke-width="1.6"/><path d="M9 3h6M9 21h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>`,
  "audio": `<path d="M4 14v-3a8 8 0 0 1 16 0v3" stroke="currentColor" stroke-width="1.6"/><rect x="2" y="14" width="5" height="6" rx="1.5" stroke="currentColor" stroke-width="1.6"/><rect x="17" y="14" width="5" height="6" rx="1.5" stroke="currentColor" stroke-width="1.6"/>`,
};
const ICONO_DEFECTO = `<path d="M21 8v8a2 2 0 0 1-1 1.7l-7 4a2 2 0 0 1-2 0l-7-4A2 2 0 0 1 3 16V8a2 2 0 0 1 1-1.7l7-4a2 2 0 0 1 2 0l7 4A2 2 0 0 1 21 8Z" stroke="currentColor" stroke-width="1.6"/>`;

function imgPlaceholder(t){
  const key = norm(t.categoria).replace(/[^a-z]/g,"");
  const path = ICONOS_CATEGORIA[key] || ICONO_DEFECTO;
  return `<svg viewBox="0 0 24 24" fill="none">${path}</svg>`;
}

function tarjetaHTML(t){
  const v = t._varSel || t.variantePorDefecto;
  const specs = (t.notas||"").split("|").map(s=>s.trim()).filter(s=>s && s!=="0").slice(0,3);
  const precioHTML = MOSTRAR_PRECIOS
    ? (v.precio ? `<div class="price">${formatCOP(v.precio)} <small>COP</small></div>` : `<div class="price-ask">Consultar precio</div>`)
    : `<div class="price-ask">Consultar precio</div>`;
  const badges = [
    `<span class="badge cat">${t.categoria}</span>`,
    t.esTendencia ? `<span class="badge trend">🔥 Más pedido</span>` : "",
    v.etiqueta ? `<span class="badge hot">${v.etiqueta}</span>` : "",
    v.disponibilidad!=="Disponible" ? `<span class="badge agotado-badge">Agotado</span>` : ""
  ].join("");
  const variantesUnicas = [...new Set(t.variantes.map(x=>x.estado))];
  const multiVariante = variantesUnicas.length>1;
  const variantRow = multiVariante ? `
    <div class="variant-price-list">
      <span class="vp-caption">Toca el estado que quieres cotizar:</span>
      ${variantesUnicas.map(est=>{
        const vv = t.variantes.find(x=>x.estado===est);
        const activa = v.estado===est;
        const off = vv.disponibilidad!=="Disponible";
        const precioTxt = MOSTRAR_PRECIOS && vv.precio ? formatCOP(vv.precio) : (off ? "Agotado" : "Consultar");
        return `<button class="vp-row ${activa?'on':''} ${off?'off':''}" data-est="${est}" ${off?'disabled':''}>
          <span class="vp-est">${est}</span>
          <span class="vp-price">${precioTxt}</span>
        </button>`;
      }).join("")}
    </div>` : "";
  const cmpOn = estado.cmp.has(t.id);
  const disabledWA = t.todasAgotadas ? "disabled" : "";

  return `
    <article class="card ${t.todasAgotadas?'agotado':''}" id="card-${t.id}">
      <div class="media">
        <div class="badges">${badges}</div>
        <button class="cmp-toggle ${cmpOn?'on':''}" title="Comparar" aria-pressed="${cmpOn}">
          <svg viewBox="0 0 24 24" fill="none"><path d="M9 3v18M15 3v18M3 9h18M3 15h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <div class="ph-icon">${imgPlaceholder(t)}</div>
        <img class="prod-img" src="images/${t.id}.jpg" alt="${t.marca} ${t.producto}"
             loading="lazy" data-id="${t.id}" data-step="0" onerror="manejarErrorImagen(this)" />
      </div>
      <div class="body">
        <div class="brand-line">${t.marca}</div>
        <h3>${t.producto}</h3>
        ${specs.length ? `<p class="desc">${specs[0]}</p>` : ""}
        <div class="specs">${specs.slice(1).map(s=>`<div class="spec">${ico.chip}<span>${s}</span></div>`).join("")}</div>
        ${multiVariante ? variantRow : `<div class="price-row">${precioHTML}</div>`}
        <div class="actions">
          <button class="btn btn-wa" data-act="wa" ${disabledWA}>
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.5 15.2L2 22l4.9-1.5A10 10 0 1 0 12 2Zm5.6 14.1c-.2.6-1.2 1.2-1.7 1.2-.4 0-1 .1-3.2-.9-2.7-1.2-4.4-4-4.5-4.2-.1-.2-1-1.4-1-2.6s.6-1.8.9-2.1c.2-.2.5-.3.7-.3h.5c.2 0 .4 0 .6.5l.8 2c.1.2.1.4 0 .5l-.4.6c-.1.2-.3.3-.1.6.1.3.7 1.1 1.4 1.7.9.8 1.6 1 1.9 1.2.2.1.4.1.5-.1l.7-.8c.2-.2.3-.2.6-.1l1.9.9c.3.1.4.2.5.3.1.3.1.9-.1 1.5Z"/></svg>
            ${t.todasAgotadas ? "Agotado" : "Me interesa"}
          </button>
          <div class="btn-row">
            <button class="btn btn-ghost" data-act="share">
              <svg viewBox="0 0 24 24" fill="none"><path d="M4 12v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7M16 6l-4-4-4 4M12 2v14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Compartir
            </button>
          </div>
        </div>
      </div>
    </article>`;
}

function render(){
  const arr = filtrar();
  const grid = $("#grid");
  $("#count").innerHTML = `<b>${TARJETAS.length}</b> productos`;
  grid.innerHTML = "";

  if(!arr.length){
    grid.innerHTML = `
      <div class="empty">
        <svg class="ico" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="m20 20-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <h3>Sin resultados</h3>
        <p>No encontramos equipos con esos filtros. Prueba con otra marca o categoría.</p>
        <button id="emptyClear">Ver todo el catálogo</button>
      </div>`;
    $("#emptyClear").onclick = limpiar;
    return;
  }

  arr.forEach((t,i)=>{
    const wrap = document.createElement("div");
    wrap.innerHTML = tarjetaHTML(t);
    const card = wrap.firstElementChild;
    card.style.animationDelay = (Math.min(i,12)*35)+"ms";
    grid.appendChild(card);

    $$('.vp-row',card).forEach(btn=>{
      btn.onclick = ()=>{
        const est = btn.dataset.est;
        t._varSel = t.variantes.find(x=>x.estado===est);
        const nuevo = document.createElement("div");
        nuevo.innerHTML = tarjetaHTML(t);
        card.replaceWith(nuevo.firstElementChild);
      };
    });
    $('.cmp-toggle',card).onclick = ()=>toggleComparar(t.id);
    const waBtn = $('[data-act="wa"]',card);
    if(waBtn && !waBtn.disabled) waBtn.onclick = ()=>meInteresa(t);
    $('[data-act="share"]',card).onclick = ()=>compartirProducto(t);
  });
}

function limpiar(){
  estado.cat="Todas"; estado.marcas.clear(); estado.sort="rel"; estado.q="";
  $("#q").value=""; $("#sort").value="rel";
  syncCatChips(); syncBrandChips(); actualizarConteosMarca(); renderActiveFilters(); render();
}
$("#clearBtn").onclick = limpiar;
$("#q").addEventListener("input", ()=>{ estado.q = $("#q").value.trim(); actualizarConteosMarca(); render(); });
$("#sort").addEventListener("change", ()=>{ estado.sort = $("#sort").value; render(); });

/* ==============================================================
   5) COMPARADOR
   ============================================================== */
function toggleComparar(id){
  if(estado.cmp.has(id)) estado.cmp.delete(id);
  else { if(estado.cmp.size>=3) return; estado.cmp.add(id); }
  syncCmpBar(); render();
}
function syncCmpBar(){
  const n = estado.cmp.size;
  $("#cmpCount").textContent = n;
  $("#cmpBar").classList.toggle("show", n>0);
  $("#cmpGo").disabled = n<2;
}
$("#cmpClr").onclick = ()=>{ estado.cmp.clear(); syncCmpBar(); render(); };
$("#cmpGo").onclick = ()=>{
  const items = [...estado.cmp].map(id=>TARJETAS.find(t=>t.id===id)).filter(Boolean);
  abrirComparador(items);
};
function abrirComparador(items){
  const specsMax = Math.max(...items.map(t=>(t.notas||"").split("|").length));
  const filas = [];
  for(let i=0;i<specsMax;i++){
    filas.push(items.map(t=>(t.notas||"").split("|").map(s=>s.trim())[i]||"—"));
  }
  const html = `
    <div style="max-width:640px">
      <h3 style="margin:0 0 16px;font-family:var(--font-disp)">Comparar equipos</h3>
      <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:12.5px;text-align:left">
        <tr>${items.map(t=>`<th style="padding:8px;border-bottom:1px solid var(--line);color:var(--ink)">${t.marca}<br>${t.producto}</th>`).join("")}</tr>
        <tr>${items.map(t=>`<td style="padding:8px;border-bottom:1px solid var(--line);font-weight:800">${formatCOP(t.variantePorDefecto?.precio)||'Consultar'}</td>`).join("")}</tr>
        ${filas.map(f=>`<tr>${f.map(c=>`<td style="padding:8px;border-bottom:1px solid var(--line-soft);color:var(--muted)">${c}</td>`).join("")}</tr>`).join("")}
      </table>
      </div>
      <button class="close-btn" id="closeCmp" style="margin-top:18px">Cerrar</button>
    </div>`;
  abrirModal(html);
  $("#closeCmp").onclick = cerrarModal;
}

/* ==============================================================
   6) FLUJO ESTRELLA · COTIZACIÓN + WHATSAPP (sin links externos)
   ============================================================== */
function mensajeWA(t,v){
  const nombre = `${t.marca} ${t.producto}` + (v.estado && v.estado!=="Nuevo" ? ` (${v.estado})` : "");
  return `¡Hola Libre y Digital! 😍 Me encantó este 👉 *${nombre}*.\n`
       + `Ya me decidí por él. ¿Me confirman disponibilidad y cómo lo puedo tener?\n`
       + `Les paso la ficha que armé 👇`;
}

async function meInteresa(t){
  const v = t._varSel || t.variantePorDefecto;
  contarClic(t);
  const mensaje = mensajeWA(t,v);

  // PRIORIDAD #1: abrir WhatsApp directo al número del negocio, con el
  // mensaje ya escrito, listo para tocar enviar — sin selector de
  // contacto ni pasos intermedios. Esto pasa siempre, de inmediato.
  window.open(`https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(mensaje)}`, "_blank");

  // La cotización se descarga en paralelo (no bloquea ni retrasa lo de
  // arriba). Si el cliente quiere adjuntarla, ya la tiene en Descargas.
  try{
    const html = cotizacionHTML(t,v);
    const nombreArch = `Cotizacion-${t.marca}-${t.producto}`.replace(/[^\w\-]+/g,"-") + ".html";
    const url = URL.createObjectURL(new Blob([html],{type:"text/html"}));
    const a = document.createElement("a"); a.href=url; a.download=nombreArch; document.body.appendChild(a); a.click(); a.remove();
  }catch(e){}
}

function contarClic(t){
  try{
    fetch(`${CONTADOR_URL}?id=${encodeURIComponent(t.id)}`, { mode: "no-cors", cache: "no-store" }).catch(()=>{});
  }catch(e){}
}

function compartirProducto(t){
  const url = new URL(location.href);
  url.searchParams.set("producto", t.id);
  const mensaje = `Mira este equipo en Libre y Digital: ${t.marca} ${t.producto} — ${url.toString()}`;
  if(navigator.share){
    navigator.share({title:`${t.marca} ${t.producto}`, text:mensaje, url:url.toString()}).catch(()=>{});
  } else {
    navigator.clipboard?.writeText(url.toString());
    abrirModal(`<div style="text-align:center"><p style="margin-bottom:16px">Enlace copiado 👍</p><button class="close-btn" id="closeShare">Cerrar</button></div>`);
    $("#closeShare").onclick = cerrarModal;
  }
}

/* ==============================================================
   7) MODAL / INSTRUCTIVO
   ============================================================== */
function abrirModal(html){
  $("#modalBox").innerHTML = html;
  $("#overlay").classList.add("show");
}
function cerrarModal(){ $("#overlay").classList.remove("show"); }
$("#overlay").addEventListener("click", e=>{ if(e.target.id==="overlay") cerrarModal(); });

  abrirModal(`
    <div class="ico-wa"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2a10 10 0 0 0-8.5 15.2L2 22l4.9-1.5A10 10 0 1 0 12 2Z" stroke="currentColor" stroke-width="2"/></svg></div>
    <h3>Ya casi está listo</h3>
    <p>Descargamos tu cotización y abrimos WhatsApp. Solo falta un paso:</p>
    <div class="steps">
      <div class="step"><div class="n">1</div><div class="t">Busca el archivo <b>Cotizacion-....html</b> que se acaba de descargar.</div></div>
      <div class="step"><div class="n">2</div><div class="t">En el chat de WhatsApp que se abrió, toca el clip <b>📎</b> y adjúntalo.</div></div>
      <div class="step"><div class="n">3</div><div class="t">Envía el mensaje que ya está escrito. ¡Eso es todo!</div></div>
    </div>
    <button class="close-btn" id="closeModal">Entendido</button>
  `);
  $("#closeModal").onclick = cerrarModal;
}
